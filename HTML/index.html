<!-- هذا السطر يخبر المتصفح أن الصفحة تستخدم HTML5 -->
<!DOCTYPE html>

<!-- بداية صفحة HTML -->
<html>

<head>

    <!-- عنوان الصفحة الذي يظهر أعلى المتصفح -->
    <title>DGWTech Website</title>

    <!-- 
    هذا السطر يربط ملف CSS مع HTML
    إذا كان اسم الملف أو المجلد غلط التنسيق لن يعمل
    -->
    <link rel="stylesheet" href="../CSS/style.css">

</head>

<body>

    <!-- عنوان رئيسي داخل الصفحة -->
    <h1>Welcome to DGWTech</h1>

    <!-- فقرة نصية -->
    <p>Mobile Devices Store</p>

    <!-- 
    form تستخدم لأخذ بيانات من المستخدم

    action:
    يحدد الملف الذي ستذهب له البيانات

    method POST:
    تستخدم لإرسال البيانات بشكل مخفي وآمن نسبيًا
    -->
    <form action="../PHP/register.php" method="POST">

        <!-- حقل لإدخال الاسم -->
        <input type="text" name="name" placeholder="Enter your name">

        <!-- حقل لإدخال الإيميل -->
        <input type="email" name="email" placeholder="Enter your email">

        <!-- زر إرسال البيانات -->
        <button type="submit">Submit</button>

    </form>

</body>

</html>
